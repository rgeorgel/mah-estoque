<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas - Mah Estoque</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .combobox { position: relative; }
        .combobox-list {
            display: none;
            position: absolute;
            top: calc(100% + 2px);
            left: 0; right: 0;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 200;
            list-style: none;
            margin: 0;
            padding: 4px 0;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
        }
        .combobox-list.open { display: block; }
        .combobox-list li {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.875rem;
            line-height: 1.4;
        }
        .combobox-list li:hover { background: #f3f4f6; }
        .combobox-list li.no-results { color: #9ca3af; cursor: default; }
        .combobox-list li.no-results:hover { background: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">Mah Estoque</div>
            <button class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav-links" id="navLinks">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="produtos.html" class="nav-link">Produtos</a>
                <a href="pedidos.html" class="nav-link" id="pedidosLink">Pedidos</a>
                <a href="vendas.html" class="nav-link">Vendas</a>
                <a href="relatorios.html" class="nav-link">Relatórios</a>
                <a href="usuarios.html" class="nav-link" id="usersLink">Usuários</a>
                <a href="configuracoes.html" class="nav-link" id="configLink">Configurações</a>
            </nav>
            <div class="user-menu">
                <span class="user-info" id="userName"></span>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Registrar Venda</h1>

        <div class="card">
            <form id="saleForm">
                <div class="form-group">
                    <label>Produto</label>
                    <div class="combobox" id="productCombobox">
                        <input type="text" id="productSearch" placeholder="Buscar produto..." autocomplete="off">
                        <ul class="combobox-list" id="productDropdown"></ul>
                    </div>
                    <input type="hidden" id="productSelect">
                </div>
                <div class="form-group hidden" id="variantGroup">
                    <label for="variantSelect">Variação</label>
                    <select id="variantSelect" required>
                        <option value="">Selecione uma variação</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Estoque Atual</label>
                    <div id="currentStock" class="stat-value">-</div>
                </div>
                <div class="form-group">
                    <label for="quantity">Quantidade</label>
                    <input type="number" id="quantity" required min="1" value="1">
                </div>
                <div class="form-group">
                    <label for="unitValue">Valor de Venda (por unidade)</label>
                    <input type="number" id="unitValue" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="saleDate">Data da Venda (opcional)</label>
                    <input type="date" id="saleDate">
                </div>
                <div class="form-group">
                    <label for="paymentMethod">Forma de Pagamento</label>
                    <select id="paymentMethod">
                        <option value="">Não informado</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Pix">Pix</option>
                        <option value="CartaoDebito">Cartão de Débito</option>
                        <option value="CartaoCredito">Cartão de Crédito</option>
                    </select>
                </div>
                <div class="form-group hidden" id="installmentsGroup">
                    <label for="installments">Parcelas</label>
                    <select id="installments">
                        <option value="1">1x (à vista)</option>
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                        <option value="4">4x</option>
                        <option value="5">5x</option>
                        <option value="6">6x</option>
                        <option value="7">7x</option>
                        <option value="8">8x</option>
                        <option value="9">9x</option>
                        <option value="10">10x</option>
                        <option value="11">11x</option>
                        <option value="12">12x</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Total</label>
                    <div id="totalValue" class="stat-value">R$ 0,00</div>
                </div>
                <div id="saleError" class="alert alert-danger hidden"></div>
                <div id="saleSuccess" class="alert alert-success hidden"></div>
                <button type="submit" class="btn btn-success btn-block">Registrar Venda</button>
            </form>
        </div>

        <h2 class="page-title mt-3">Últimas Vendas</h2>
        <div class="card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Produto</th>
                            <th>Variação</th>
                            <th>Quantidade</th>
                            <th>Valor Unit.</th>
                            <th>Total</th>
                            <th>Pagamento</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="salesTable"></tbody>
                </table>
            </div>
            <div id="emptySales" class="empty-state hidden">
                <p>Nenhuma venda registrada</p>
            </div>
        </div>
    </main>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Editar Venda</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editTransactionId">
                <div class="form-group">
                    <label>Produto</label>
                    <div id="editProductName" class="stat-value"></div>
                </div>
                <div class="form-group">
                    <label for="editQuantity">Quantidade</label>
                    <input type="number" id="editQuantity" required min="1">
                </div>
                <div class="form-group">
                    <label for="editUnitValue">Valor de Venda (por unidade)</label>
                    <input type="number" id="editUnitValue" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="editDate">Data da Venda</label>
                    <input type="date" id="editDate">
                </div>
                <div class="form-group">
                    <label for="editPaymentMethod">Forma de Pagamento</label>
                    <select id="editPaymentMethod">
                        <option value="">Não informado</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Pix">Pix</option>
                        <option value="CartaoDebito">Cartão de Débito</option>
                        <option value="CartaoCredito">Cartão de Crédito</option>
                    </select>
                </div>
                <div class="form-group hidden" id="editInstallmentsGroup">
                    <label for="editInstallments">Parcelas</label>
                    <select id="editInstallments">
                        <option value="1">1x (à vista)</option>
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                        <option value="4">4x</option>
                        <option value="5">5x</option>
                        <option value="6">6x</option>
                        <option value="7">7x</option>
                        <option value="8">8x</option>
                        <option value="9">9x</option>
                        <option value="10">10x</option>
                        <option value="11">11x</option>
                        <option value="12">12x</option>
                    </select>
                </div>
                <div id="editError" class="alert alert-danger hidden"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" onclick="deleteTransaction()">Excluir</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/build.js"></script>
    <script src="js/api.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
            document.querySelector('.hamburger').classList.toggle('active');
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('navLinks').classList.remove('active');
                document.querySelector('.hamburger').classList.remove('active');
            });
        });

        if (!checkAuth()) {
            throw new Error('Auth required');
        }

        const user = getCurrentUser();
        document.getElementById('userName').textContent = user.username;

        if (!checkRole(['Admin', 'Manager'])) {
            document.getElementById('pedidosLink').style.display = 'none';
        }
        if (!checkRole(['Admin'])) {
            document.getElementById('usersLink').style.display = 'none';
            document.getElementById('configLink').style.display = 'none';
        }

        const PAYMENT_LABELS = {
            'Dinheiro': 'Dinheiro',
            'Pix': 'Pix',
            'CartaoDebito': 'Cartão de Débito',
            'CartaoCredito': 'Cartão de Crédito'
        };

        function formatPaymentMethod(method, installments) {
            if (!method) return '-';
            const label = PAYMENT_LABELS[method] || method;
            if (method === 'CartaoCredito' && installments && installments > 1)
                return `${label} ${installments}x`;
            return label;
        }

        let products = [];

        function buildProductLabel(p) {
            const totalQty = p.variants && p.variants.length > 0
                ? p.variants.reduce((s, v) => s + v.quantity, 0)
                : p.quantity;
            return p.variants && p.variants.length > 0
                ? `${p.name} (${p.variants.length} variações)`
                : `${p.name}${p.sku ? ' [' + p.sku + ']' : ''}${p.size ? ' - ' + p.size : ''} — Estoque: ${totalQty}`;
        }

        function openProductDropdown(query) {
            const q = (query || '').toLowerCase();
            const filtered = q ? products.filter(p => p.name.toLowerCase().includes(q)) : products;
            const list = document.getElementById('productDropdown');
            if (filtered.length === 0) {
                list.innerHTML = '<li class="no-results">Nenhum produto encontrado</li>';
            } else {
                list.innerHTML = filtered.map(p =>
                    `<li data-id="${p.id}">${buildProductLabel(p)}</li>`
                ).join('');
            }
            list.classList.add('open');
        }

        function closeProductDropdown() {
            document.getElementById('productDropdown').classList.remove('open');
        }

        function selectProduct(productId, label) {
            document.getElementById('productSearch').value = label;
            document.getElementById('productSelect').value = productId;
            closeProductDropdown();
            onProductSelected(productId);
        }

        function resetCombobox() {
            document.getElementById('productSearch').value = '';
            document.getElementById('productSelect').value = '';
            closeProductDropdown();
            onProductSelected('');
        }

        function onProductSelected(productId) {
            const product = products.find(p => p.id === productId);
            const variantGroup = document.getElementById('variantGroup');
            const variantSelect = document.getElementById('variantSelect');

            if (!product) {
                variantGroup.classList.add('hidden');
                variantSelect.required = false;
                document.getElementById('currentStock').textContent = '-';
                return;
            }

            if (product.variants && product.variants.length > 0) {
                variantGroup.classList.remove('hidden');
                variantSelect.required = true;
                variantSelect.innerHTML = '<option value="">Selecione uma variação</option>' +
                    product.variants.map(v => {
                        const label = [v.size, v.color].filter(Boolean).join(' / ') || 'Sem nome';
                        const sku = v.sku ? ` [${v.sku}]` : '';
                        return `<option value="${v.id}" data-stock="${v.quantity}">${label}${sku} — Estoque: ${v.quantity}</option>`;
                    }).join('');
                document.getElementById('currentStock').textContent = '-';
                document.getElementById('quantity').max = '';
            } else {
                variantGroup.classList.add('hidden');
                variantSelect.required = false;
                variantSelect.value = '';
                document.getElementById('currentStock').textContent = product.quantity;
                document.getElementById('quantity').max = product.quantity;
            }
        }

        async function loadProducts() {
            try {
                products = await request('/products');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function loadSales() {
            try {
                const transactions = await request('/transactions');
                const sales = transactions.filter(t => t.type === 'Sale');
                const tbody = document.getElementById('salesTable');
                const emptyState = document.getElementById('emptySales');

                if (sales.length === 0) {
                    tbody.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }

                emptyState.classList.add('hidden');
                tbody.innerHTML = sales.map(s => {
                    let variantLabel = '-';
                    if (s.variantSize || s.variantColor) {
                        variantLabel = [s.variantSize, s.variantColor].filter(Boolean).join(' / ');
                        if (s.variantSKU) variantLabel += ` [${s.variantSKU}]`;
                    } else if (s.productSize) {
                        variantLabel = s.productSize;
                    }
                    const paymentLabel = formatPaymentMethod(s.paymentMethod, s.installments);
                    return `
                    <tr>
                        <td>${formatDate(s.createdAt)}</td>
                        <td>${s.productName}</td>
                        <td>${variantLabel}</td>
                        <td>${s.quantity}</td>
                        <td>${formatCurrency(s.unitValue)}</td>
                        <td>${formatCurrency(s.totalValue)}</td>
                        <td>${paymentLabel}</td>
                        <td class="actions">
                            <button class="btn btn-sm btn-secondary" onclick="editTransaction('${s.id}')">Editar</button>
                        </td>
                    </tr>`;
                }).join('');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        document.getElementById('productSearch').addEventListener('focus', (e) => {
            openProductDropdown(e.target.value);
        });

        document.getElementById('productSearch').addEventListener('input', (e) => {
            document.getElementById('productSelect').value = '';
            openProductDropdown(e.target.value);
        });

        document.getElementById('productDropdown').addEventListener('click', (e) => {
            const li = e.target.closest('li[data-id]');
            if (li) selectProduct(li.dataset.id, li.textContent);
        });

        document.addEventListener('click', (e) => {
            if (!document.getElementById('productCombobox').contains(e.target))
                closeProductDropdown();
        });

        document.getElementById('variantSelect').addEventListener('change', (e) => {
            const selected = e.target.options[e.target.selectedIndex];
            const stock = selected.dataset.stock || '0';
            document.getElementById('currentStock').textContent = stock;
            document.getElementById('quantity').max = stock;
        });

        document.getElementById('paymentMethod').addEventListener('change', (e) => {
            const group = document.getElementById('installmentsGroup');
            if (e.target.value === 'CartaoCredito') {
                group.classList.remove('hidden');
            } else {
                group.classList.add('hidden');
                document.getElementById('installments').value = '1';
            }
        });

        document.getElementById('editPaymentMethod').addEventListener('change', (e) => {
            const group = document.getElementById('editInstallmentsGroup');
            if (e.target.value === 'CartaoCredito') {
                group.classList.remove('hidden');
            } else {
                group.classList.add('hidden');
                document.getElementById('editInstallments').value = '1';
            }
        });

        document.getElementById('quantity').addEventListener('input', calculateTotal);
        document.getElementById('unitValue').addEventListener('input', calculateTotal);

        function calculateTotal() {
            const quantity = parseInt(document.getElementById('quantity').value) || 0;
            const unitValue = parseFloat(document.getElementById('unitValue').value) || 0;
            document.getElementById('totalValue').textContent = formatCurrency(quantity * unitValue);
        }

        document.getElementById('saleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('saleError');
            const successMsg = document.getElementById('saleSuccess');
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            const productId = document.getElementById('productSelect').value;
            if (!productId) {
                errorMsg.textContent = 'Selecione um produto.';
                errorMsg.classList.remove('hidden');
                return;
            }

            const variantId = document.getElementById('variantSelect').value || null;
            const quantity = parseInt(document.getElementById('quantity').value);
            const unitValue = parseFloat(document.getElementById('unitValue').value);
            const saleDateInput = document.getElementById('saleDate').value;

            const paymentMethod = document.getElementById('paymentMethod').value;
            const installments = parseInt(document.getElementById('installments').value);

            const data = { productId, type: 'Sale', quantity, unitValue };
            if (variantId) data.variantId = variantId;
            if (saleDateInput) {
                data.createdAt = new Date(saleDateInput + 'T12:00:00').toISOString();
            }
            if (paymentMethod) {
                data.paymentMethod = paymentMethod;
                if (paymentMethod === 'CartaoCredito') data.installments = installments;
            }

            try {
                await request('/transactions', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                successMsg.textContent = 'Venda registrada com sucesso!';
                successMsg.classList.remove('hidden');
                document.getElementById('saleForm').reset();
                resetCombobox();
                document.getElementById('variantGroup').classList.add('hidden');
                document.getElementById('variantSelect').required = false;
                document.getElementById('currentStock').textContent = '-';
                document.getElementById('totalValue').textContent = 'R$ 0,00';
                document.getElementById('installmentsGroup').classList.add('hidden');

                loadProducts();
                loadSales();
                showToast('Venda registrada com sucesso');
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
            }
        });

        async function editTransaction(id) {
            try {
                const transactions = await request('/transactions');
                const sale = transactions.find(t => t.id === id);
                if (!sale) {
                    showToast('Venda não encontrada', 'error');
                    return;
                }

                let productLabel = sale.productName;
                if (sale.variantSize || sale.variantColor) {
                    productLabel += ' — ' + [sale.variantSize, sale.variantColor].filter(Boolean).join(' / ');
                }

                document.getElementById('editTransactionId').value = id;
                document.getElementById('editProductName').textContent = productLabel;
                document.getElementById('editQuantity').value = sale.quantity;
                document.getElementById('editUnitValue').value = sale.unitValue;

                const date = new Date(sale.createdAt);
                document.getElementById('editDate').value = [
                    date.getFullYear(),
                    String(date.getMonth() + 1).padStart(2, '0'),
                    String(date.getDate()).padStart(2, '0')
                ].join('-');

                const editPayment = document.getElementById('editPaymentMethod');
                editPayment.value = sale.paymentMethod || '';
                const editInstGroup = document.getElementById('editInstallmentsGroup');
                if (sale.paymentMethod === 'CartaoCredito') {
                    editInstGroup.classList.remove('hidden');
                    document.getElementById('editInstallments').value = sale.installments || 1;
                } else {
                    editInstGroup.classList.add('hidden');
                    document.getElementById('editInstallments').value = '1';
                }

                document.getElementById('editError').classList.add('hidden');
                document.getElementById('editModal').classList.add('active');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('editError');
            errorMsg.classList.add('hidden');

            const id = document.getElementById('editTransactionId').value;
            const quantity = parseInt(document.getElementById('editQuantity').value);
            const unitValue = parseFloat(document.getElementById('editUnitValue').value);
            const dateInput = document.getElementById('editDate').value;
            const paymentMethod = document.getElementById('editPaymentMethod').value;
            const installments = parseInt(document.getElementById('editInstallments').value);

            const data = { quantity, unitValue };
            if (dateInput) {
                data.createdAt = new Date(dateInput + 'T12:00:00').toISOString();
            }
            data.paymentMethod = paymentMethod || null;
            if (paymentMethod === 'CartaoCredito') data.installments = installments;

            try {
                await request(`/transactions/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                showToast('Venda atualizada com sucesso');
                closeEditModal();
                loadProducts();
                loadSales();
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
            }
        });

        async function deleteTransaction() {
            const id = document.getElementById('editTransactionId').value;
            if (!confirm('Tem certeza que deseja excluir esta venda?')) return;

            try {
                await request(`/transactions/${id}`, { method: 'DELETE' });
                showToast('Venda excluída com sucesso');
                closeEditModal();
                loadProducts();
                loadSales();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        loadProducts();
        loadSales();
    </script>
</body>
</html>
