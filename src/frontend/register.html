<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Mah Estoque</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Criar Conta</h1>
            <form id="registerForm">
                <div class="form-group">
                    <label for="tenantName">Nome da Empresa</label>
                    <input type="text" id="tenantName" name="tenantName" required>
                </div>
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Email (opcional)</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Senha</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                <div id="errorMessage" class="alert alert-danger hidden"></div>
                <div id="successMessage" class="alert alert-success hidden"></div>
                <button type="submit" class="btn btn-primary btn-block">Cadastrar</button>
            </form>
            <p class="text-center mt-2">
                Já tem conta? <a href="login.html" style="color: var(--primary);">Entrar</a>
            </p>
        </div>
    </div>

    <script src="js/build.js"></script>
    <script src="js/api.js"></script>
    <script>
        if (auth.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            const tenantName = document.getElementById('tenantName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                errorMsg.textContent = 'As senhas não conferem';
                errorMsg.classList.remove('hidden');
                return;
            }

            try {
                await request('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ tenantName, username, email, password })
                });

                successMsg.textContent = 'Conta criada com sucesso! Agora você pode fazer login.';
                successMsg.classList.remove('hidden');
                document.getElementById('registerForm').reset();
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
