version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=mahestoque;Username=postgres;Password=${DB_PASSWORD:-postgres123}
      - Jwt__Secret=${JWT_SECRET:-MahEstoqueSecretKey2026VeryLongAndSecure!}
      - Jwt__ExpirationHours=24
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=mahestoque
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "9433:5432"
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    volumes:
      - ./src/frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8097:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata: